version: '3.8'

services:
  mqtt:
    image: eclipse-mosquitto:2.0.18
    container_name: ecoedge-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./pipeline/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    networks:
      - ecoedge-network

  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: ecoedge-pipeline
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER_HOST=mqtt
      - MQTT_BROKER_PORT=1883
      - MQTT_TOPIC=telemetry/#
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
    volumes:
      - ./pipeline:/app
      - iot_data:/app/data
    depends_on:
      - mqtt
    networks:
      - ecoedge-network
    restart: unless-stopped

volumes:
  mqtt_data:
  mqtt_logs:
  iot_data:

networks:
  ecoedge-network:
    driver: bridge