# Default: subscribe to public HiveMQ (same as Wokwi broker.hivemq.com).
# Optional: uncomment `mqtt` + set MQTT_BROKER_HOST=mqtt for local Mosquitto.

services:
  mqtt_merge:
    build: .
    container_name: ecoedge-mqtt-merge
    ports:
      - "8000:8000"
    environment:
      MQTT_BROKER_HOST: broker.hivemq.com
      MQTT_BROKER_PORT: "1883"
      MQTT_TOPIC: telemetry/ADWYA-CHILLER-01
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LOG_LEVEL: INFO
      MQTT_MERGE_DB_PATH: /app/data/iot_data.db
    volumes:
      - iot_data:/app/data
    networks:
      - ecoedge-network

  # Local broker (optional): docker compose --profile local up
  mqtt:
    profiles:
      - local
    image: eclipse-mosquitto:2.0.18
    container_name: ecoedge-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    networks:
      - ecoedge-network

volumes:
  iot_data:

networks:
  ecoedge-network:
    driver: bridge
